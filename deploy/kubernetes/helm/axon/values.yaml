backend:
  replicaCount: 2
  image: ghcr.io/aarohim24/traject-backend:latest
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 1Gi

dashboard:
  replicaCount: 1
  image: ghcr.io/aarohim24/traject-dashboard:latest
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

postgres:
  enabled: true
  storageSize: 20Gi

redis:
  enabled: true
  storageSize: 2Gi

ingress:
  enabled: false
  host: ""

config:
  # Replace the credentials below with strong, unique values before deploying.
  # Do NOT reuse the old axon/axon defaults.
  DATABASE_URL: "postgresql+asyncpg://traject:CHANGE_ME_STRONG_PASSWORD@postgres:5432/traject"
  # Redis requires a password; include it in the URL (redis://:<password>@host).
  REDIS_URL: "redis://:CHANGE_ME_STRONG_PASSWORD@redis:6379/0"
  # The backend REFUSES TO START on this placeholder — set a strong unique key.
  API_KEY: "CHANGE_ME_API_KEY"
  API_HOST: "0.0.0.0"
  API_PORT: "8000"
