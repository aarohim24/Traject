apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-dashboard
  labels:
    {{- include "axon.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "axon.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: dashboard
  ports:
    - name: http
      port: 80
      targetPort: 80
      protocol: TCP
