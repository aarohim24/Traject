apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-backend
  labels:
    {{- include "axon.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "axon.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: backend
  ports:
    - name: http
      port: 8000
      targetPort: 8000
      protocol: TCP
