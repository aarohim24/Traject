services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: axon
      POSTGRES_PASSWORD: axon
      POSTGRES_DB: axon
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U axon"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "6379:6379"

  axon-backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://axon:axon@postgres:5432/axon
      REDIS_URL: redis://redis:6379/0
      API_KEY: ${AXON_API_KEY:-dev-key-change-in-production}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  grafana:
    image: grafana/grafana:10.4.0
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_INSTALL_PLUGINS: "marcusolsson-json-datasource"
    volumes:
      - ../dashboards/grafana/provisioning:/etc/grafana/provisioning
      - ../dashboards/grafana/dashboards:/var/lib/grafana/dashboards
      - grafana_data:/var/lib/grafana/data
    depends_on:
      - axon-backend
    ports:
      - "3000:3000"

volumes:
  postgres_data:
  redis_data:
  grafana_data:
