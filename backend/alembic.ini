# Alembic configuration file for traject-backend.
# See https://alembic.sqlalchemy.org for documentation.

[alembic]
# Path to the Alembic migration scripts directory
script_location = migrations

# Template used to generate migration file names.
file_template = %%(rev)s_%%(slug)s

# sys.path expansion; add the backend root so traject_backend is importable
prepend_sys_path = .

# Timezone used when rendering the date within the migration file.
timezone = UTC

# Max length of characters to apply to the "slug" field
truncate_slug_length = 40

# Set to 'true' to run the environment during the 'revision' command.
revision_environment = false

# Set to 'true' to allow .pyc and .pyo files without a source .py file.
sourceless = false

# Version path separator — defaults to os.pathsep.
# version_path_separator = os  # Use os.pathsep
# version_path_separator = :   # Unix path separator
# version_path_separator = ;   # Windows path separator
version_path_separator = os  # Use os.pathsep

# Alembic will look for migration scripts in this directory.
# This value is relative to script_location.
# version_locations = %(here)s/bar:%(here)s/bat:migrations/versions

[post_write_hooks]
# Uncomment to run ruff format on generated migration files:
# hooks = ruff-format
# ruff-format.type = exec
# ruff-format.executable = ruff
# ruff-format.options = format REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
