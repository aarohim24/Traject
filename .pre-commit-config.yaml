# Pre-commit hooks for Axon SDK
# ruff-pre-commit v0.4.9: https://github.com/astral-sh/ruff-pre-commit
# mirrors-mypy v1.10.1: https://github.com/pre-commit/mirrors-mypy

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.9
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.1
    hooks:
      - id: mypy
        args: [--strict]
        additional_dependencies:
          - pydantic>=2.6
          - types-all
