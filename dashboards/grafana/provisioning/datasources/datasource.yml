apiVersion: 1

datasources:
  - name: Traject Backend
    uid: traject-backend
    type: marcusolsson-json-datasource
    access: proxy
    url: http://traject-backend:8000
    jsonData:
      queryParams: ""
    secureJsonData:
      headers: '{"X-Traject-API-Key": "${API_KEY}"}'
    isDefault: true
    editable: true
