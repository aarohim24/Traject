name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  compile:
    name: Compile Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Byte-compile all backend and SDK source
        # Fast gate: a non-compiling commit (e.g. SyntaxError) must never go green.
        run: python -m compileall backend/traject_backend sdk/python/traject

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install SDK with dev extras (required for import resolution)
        run: pip install -e "sdk/python[dev,openai,anthropic,mcp,proxy]" -q
      - name: ruff check
        run: ruff check sdk/python/traject sdk/python/tests
      - name: ruff format check
        run: ruff format --check sdk/python/traject sdk/python/tests

  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install SDK with all optional deps (required for mypy --strict)
        # All optional extras installed so mypy can resolve every import.
        # autogen has no stubs — covered by ignore_missing_imports in pyproject.toml.
        run: pip install -e "sdk/python[dev,openai,anthropic,langchain,mcp,proxy,ml,bedrock,vertex]" -q
      - name: mypy strict
        run: mypy sdk/python/traject --strict --config-file sdk/python/pyproject.toml

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install package with all test-relevant extras
        # mcp and proxy are included so their unit tests can import the modules.
        # dev extras now include sqlalchemy+aiosqlite for batch/job_tracker tests.
        run: pip install -e "sdk/python[openai,anthropic,langchain,mcp,proxy,dev]"
      - name: Run tests
        run: pytest sdk/python/tests/unit/ sdk/python/tests/integration/ --cov=traject --cov-fail-under=80 --cov-report=xml
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  benchmark:
    name: Benchmark
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install package with dev extras
        run: pip install -e "sdk/python[openai,dev]"
      - name: SDK overhead benchmark
        # GitHub Actions runners are slower than local hardware.
        # 25ms gives comfortable headroom; local p50 is ~7ms.
        run: python sdk/python/tests/benchmarks/bench_sdk_overhead.py --assert-median-ms 25
      - name: Compression latency benchmark
        # Dedup pass adds ~10ms on the CI runner; raised from 50→75ms.
        run: python sdk/python/tests/benchmarks/bench_compression_latency.py --assert-median-ms 75

  welcome-contributor:
    name: Welcome First-Time Contributor
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/first-interaction@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          pr-message: |
            👋 Welcome, and thanks for opening your first pull request to Traject!

            A maintainer will review your PR shortly. In the meantime, please check that:
            - All CI checks are passing (lint, type-check, tests)
            - Your commit messages follow the [Conventional Commits](https://www.conventionalcommits.org/) format
            - You've read [CONTRIBUTING.md](https://github.com/${{ github.repository }}/blob/main/CONTRIBUTING.md)

            We're glad you're here. 🚀

  backend-test:
    name: Backend Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: traject
          POSTGRES_PASSWORD: traject
          POSTGRES_DB: traject_test
        ports:
          - "5432:5432"
        options: >-
          --health-cmd "pg_isready -U traject"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - "6379:6379"
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install SDK from source (required by backend)
        run: pip install -e "sdk/python[dev,ml]" -q
      - name: Install backend dev dependencies
        run: pip install -e "backend[dev]"
      - name: Run Alembic migrations
        run: alembic upgrade head
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://traject:traject@localhost:5432/traject_test
      - name: Run backend tests
        run: pytest tests/ --cov=traject_backend --cov-fail-under=75
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://traject:traject@localhost:5432/traject_test
          REDIS_URL: redis://localhost:6379/0

  typescript-test:
    name: TypeScript Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/typescript
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install
      - name: Type check
        run: npm run typecheck
      - name: Lint
        run: npm run lint
      - name: Test
        run: npm test -- --coverage

  pip-audit:
    name: Dependency Audit (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install pip-audit
        run: pip install pip-audit -q
      - name: Install SDK with all optional deps
        run: pip install -e "sdk/python[dev,openai,anthropic,langchain,mcp,proxy,ml,bedrock,vertex]" -q
      - name: Install backend dev dependencies
        run: pip install -e "backend[dev]" -q
      - name: Audit installed dependencies
        # Audits the resolved environment (backend + SDK + extras). Fails the
        # build on any known vulnerability so a vulnerable dep can't ship.
        run: pip-audit

  bandit:
    name: Static Security Analysis (bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install bandit
        run: pip install bandit -q
      - name: Run bandit (medium+ severity)
        run: bandit -r backend/traject_backend sdk/python/traject -ll

  npm-audit:
    name: Dependency Audit (npm)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
      - name: Audit dashboard dependencies
        working-directory: dashboard
        run: |
          npm install --package-lock-only
          npm audit --audit-level=high
      - name: Audit TypeScript SDK dependencies
        working-directory: sdk/typescript
        run: |
          npm install --package-lock-only
          npm audit --audit-level=high
