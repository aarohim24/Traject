name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ruff
        run: pip install ruff>=0.4
      - name: ruff check
        run: ruff check sdk/python/axon sdk/python/tests
      - name: ruff format check
        run: ruff format --check sdk/python/axon sdk/python/tests

  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install mypy and dependencies
        run: pip install mypy>=1.10 pydantic>=2.6 sentence-transformers>=3.0 opentelemetry-sdk>=1.24 opentelemetry-api>=1.24 structlog>=24.1 tiktoken>=0.7
      - name: mypy strict
        run: mypy sdk/python/axon --strict

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package with dev extras
        run: pip install -e "sdk/python[openai,anthropic,langchain,dev]"
      - name: Run tests
        run: pytest sdk/python/tests/unit/ sdk/python/tests/integration/ --cov=axon --cov-fail-under=80 --cov-report=xml
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  benchmark:
    name: Benchmark
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package with dev extras
        run: pip install -e "sdk/python[openai,dev]"
      - name: SDK overhead benchmark
        run: python sdk/python/tests/benchmarks/bench_sdk_overhead.py --assert-median-ms 5
      - name: Compression latency benchmark
        run: python sdk/python/tests/benchmarks/bench_compression_latency.py --assert-median-ms 50
