server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — serve index.html for all unmatched routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Block any proxy attempts to /api (the backend is not behind this nginx)
    location /api {
        return 404;
    }
}
